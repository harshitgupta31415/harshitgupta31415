<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="126" viewBox="0 0 1100 126" role="img" aria-labelledby="title desc">
  <title id="title">Professional channels</title>
  <desc id="desc">An animated signal moves between Harshit Gupta's professional contact channels.</desc>
  <style>
    .label { fill: #8b949e; font: 600 12px ui-monospace, SFMono-Regular, Consolas, monospace; letter-spacing: 0; }
    .heading { fill: #f0f6fc; font: 700 19px ui-monospace, SFMono-Regular, Consolas, monospace; letter-spacing: 0; }
    .detail { fill: #8b949e; font: 500 12px ui-monospace, SFMono-Regular, Consolas, monospace; letter-spacing: 0; }
    .signal { animation: travel 6s ease-in-out infinite; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    @keyframes travel {
      0%, 7% { transform: translateX(0); }
      93%, 100% { transform: translateX(910px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: .35; transform: scale(.75); }
      50% { opacity: 1; transform: scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .signal, .pulse { animation: none; }
    }
  </style>

  <rect x="1" y="1" width="1098" height="124" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="2" />
  <rect x="22" y="20" width="4" height="27" rx="2" fill="#58a6ff" />
  <text x="40" y="37" class="heading">PROFESSIONAL CHANNELS</text>
  <text x="40" y="55" class="detail">Vedonyx // New Delhi, India // UTC +05:30</text>

  <line x1="70" y1="84" x2="1030" y2="84" stroke="#30363d" stroke-width="2" />

  <g fill="#161b22" stroke="#58a6ff" stroke-width="2">
    <circle cx="70" cy="84" r="6" />
    <circle cx="262" cy="84" r="6" />
    <circle cx="454" cy="84" r="6" />
    <circle cx="646" cy="84" r="6" />
    <circle cx="838" cy="84" r="6" />
    <circle cx="1030" cy="84" r="6" />
  </g>

  <circle class="pulse" cx="70" cy="84" r="12" fill="none" stroke="#3fb950" stroke-width="2" />
  <g class="signal">
    <circle cx="70" cy="84" r="5" fill="#3fb950" />
    <circle cx="70" cy="84" r="11" fill="none" stroke="#3fb950" stroke-width="2" opacity=".35" />
  </g>

  <g text-anchor="middle" class="label">
    <text x="70" y="109">EMAIL</text>
    <text x="262" y="109">LINKEDIN</text>
    <text x="454" y="109">GITHUB</text>
    <text x="646" y="109">LEETCODE</text>
    <text x="838" y="109">CODEFORCES</text>
    <text x="1030" y="109">ACHIEVEMENTS</text>
  </g>
</svg>
