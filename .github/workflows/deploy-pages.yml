name: Deploy animated profile

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "assets/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site/assets
          cp -R site/. _site/
          cp assets/profile-header.svg _site/assets/
          cp assets/profile-intro.mp4 _site/assets/
          cp assets/terminal-loop.gif _site/assets/
          cp assets/codeforces-rating.svg _site/assets/
          cp assets/system-map.svg _site/assets/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
