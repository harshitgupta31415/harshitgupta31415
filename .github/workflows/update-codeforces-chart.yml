name: Update Codeforces rating chart

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate chart from Codeforces API
        run: node scripts/update-codeforces-chart.mjs

      - name: Commit an updated chart
        run: |
          if git diff --quiet -- assets/codeforces-rating.svg; then
            echo "Rating chart is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/codeforces-rating.svg
          git commit -m "chore: update Codeforces rating chart"
          git push
